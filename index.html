<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sambrizzi Producción · Productor de Moda Internacional</title>
    <meta name="description" content="Sambrizzi Producción — alta costura, fashion week y experiencias internacionales por Mathias Sambrizzi." />
    <meta name="author" content="Sambrizzi Producción" />
    <meta name="robots" content="index, follow, max-image-preview:large" />
    <meta name="theme-color" content="#0a0a0a" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Sambrizzi Producción" />
    <meta property="og:locale" content="es_AR" />
    <meta name="twitter:card" content="summary_large_image" />
    <link rel="icon" href="/favicon.ico?v=2" />
    
    <!-- Load fonts without preload - let browser optimize -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700&family=Inter:wght@300;400;500;600&display=swap" />
    
    <!-- Critical CSS inline to prevent FOUC -->
    <style>
      :root {
        --radius: 0.25rem;
        --background: oklch(0.04 0 0);
        --foreground: oklch(0.96 0.005 80);
        --card: oklch(0.08 0.005 60);
        --card-foreground: oklch(0.96 0.005 80);
        --popover: oklch(0.06 0 0);
        --popover-foreground: oklch(0.96 0.005 80);
        --primary: oklch(0.78 0.095 80);
        --primary-foreground: oklch(0.04 0 0);
        --secondary: oklch(0.14 0.005 60);
        --secondary-foreground: oklch(0.96 0.005 80);
        --muted: oklch(0.12 0.005 60);
        --muted-foreground: oklch(0.62 0.015 80);
        --accent: oklch(0.78 0.095 80);
        --accent-foreground: oklch(0.04 0 0);
        --destructive: oklch(0.55 0.2 25);
        --destructive-foreground: oklch(0.98 0 0);
        --border: oklch(0.2 0.01 80 / 0.5);
        --input: oklch(0.18 0.01 80);
        --ring: oklch(0.78 0.095 80);
        --gold: oklch(0.78 0.095 80);
        --gold-bright: oklch(0.88 0.115 88);
        --gold-deep: oklch(0.58 0.09 70);
        --cream: oklch(0.96 0.012 80);
        --ink: oklch(0.04 0 0);
        --ash: oklch(0.12 0.005 60);
        --font-display: "Playfair Display", "Times New Roman", "Georgia", serif;
        --font-sans: "Inter", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        --color-background: var(--background);
        --color-foreground: var(--foreground);
        --color-card: var(--card);
        --color-card-foreground: var(--card-foreground);
        --color-popover: var(--popover);
        --color-popover-foreground: var(--popover-foreground);
        --color-primary: var(--primary);
        --color-primary-foreground: var(--primary-foreground);
        --color-secondary: var(--secondary);
        --color-secondary-foreground: var(--secondary-foreground);
        --color-muted: var(--muted);
        --color-muted-foreground: var(--muted-foreground);
        --color-accent: var(--accent);
        --color-accent-foreground: var(--accent-foreground);
        --color-destructive: var(--destructive);
        --color-destructive-foreground: var(--destructive-foreground);
        --color-border: var(--border);
        --color-input: var(--input);
        --color-ring: var(--ring);
        --color-gold: var(--gold);
        --color-gold-bright: var(--gold-bright);
        --color-gold-deep: var(--gold-deep);
        --color-cream: var(--cream);
        --color-ink: var(--ink);
        --color-ash: var(--ash);
      }
      
      * {
        border-color: var(--color-border);
      }
      
      html {
        scroll-behavior: smooth;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      
      body {
        background-color: var(--color-background);
        color: var(--color-foreground);
        font-family: var(--font-sans);
        font-weight: 300;
        letter-spacing: 0.01em;
        overflow-x: hidden;
        margin: 0;
        padding: 0;
      }
      
      ::selection {
        background: var(--gold);
        color: var(--ink);
      }
      
      ::-webkit-scrollbar { width: 8px; height: 8px; }
      ::-webkit-scrollbar-track { background: var(--ink); }
      ::-webkit-scrollbar-thumb {
        background: linear-gradient(var(--gold-deep), var(--gold));
        border-radius: 4px;
      }
    </style>
    
    <!-- Main CSS loaded before script to prevent FOUC -->
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
